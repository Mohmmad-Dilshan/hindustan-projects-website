name: Continuous Integration

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  # ────────────────────────────────────────────────────────────
  client-ci:
    name: Client CI (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Check Linting & Formatting
        run: npm run lint

      - name: Run Unit Tests
        run: npm test

      - name: Build Application
        run: npm run build

  # ────────────────────────────────────────────────────────────
  server-ci:
    name: Server CI (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      DATABASE_URL: ""
      CLIENT_URL: http://localhost:5173
      ADMIN_SECRET_PATH: ci-test-admin-path
      PORT: "5001"
      INTEGRATION_MASTER_KEY: ci-test-master-key

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check Linting & Formatting
        run: npm run lint

      - name: Run Tests
        run: npm test
